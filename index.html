<!-- HTML template for the frontend react app: https://developer.mozilla.org/en-US/docs/Web/HTML -->
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Everest" />
    
    <!-- Primary Meta Tags -->
    <title>Everest Preparatórios - Plataforma de Estudos</title>
    <meta name="title" content="Everest Preparatórios - Plataforma de Estudos" />
    <meta name="description" content="Plataforma completa de estudos para concursos e vestibulares. Cursos, flashcards, quizzes, redações e muito mais!" />
    <meta name="theme-color" content="#ff6b35" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Everest Preparatórios - Plataforma de Estudos" />
    <meta property="og:description" content="Plataforma completa de estudos para concursos e vestibulares" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Everest Preparatórios" />
    <meta property="twitter:description" content="Plataforma completa de estudos para concursos e vestibulares" />
    <meta property="twitter:image" content="/og-image.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  </head>

  <body style="margin:0;">
    <script>
      // Apply theme BEFORE anything renders to prevent flash
      (function() {
        var theme = localStorage.getItem('vite-ui-theme') || 'dark';
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(theme);
        var bg = theme === 'dark' ? '#0a0a0b' : '#ffffff';
        var textColor = theme === 'dark' ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)';
        document.body.style.background = bg;
        // Also set loader bg immediately
        document.addEventListener('DOMContentLoaded', function() {
          var loader = document.getElementById('initial-loader');
          if (loader) { loader.style.background = bg; }
          var loaderText = loader && loader.querySelector('p');
          if (loaderText) { loaderText.style.color = textColor; }
        });
      })();
    </script>
    <div id="root"></div>
    <!-- Fullscreen loader visible until React renders -->
    <div id="initial-loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:99999;background:#0a0a0b;">
      <div style="text-align:center;">
        <div style="width:32px;height:32px;border:3px solid rgba(255,107,53,0.2);border-top-color:#ff6b35;border-radius:50%;animation:ld-spin 0.8s linear infinite;margin:0 auto;"></div>
        <p style="margin-top:16px;color:rgba(255,255,255,0.5);font-family:system-ui;font-size:14px;">Carregando...</p>
      </div>
    </div>
    <style>@keyframes ld-spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
